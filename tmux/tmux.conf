# Tmux Hierarchy
# 
#	Sessions ---> Windows ---> Panes

unbind r
bind r source-file ~/.config/tmux/tmux.conf

set -g mouse on
set -g prefix C-a
set -g base-index 1
set -g pane-base-index 1
set -g renumber-windows on

set -g @plugin 'tmux-plugins/tpm'
set -g @plugin 'o0th/tmux-nova'

set -g @nova-nerdfonts true
set -g @nova-nerdfonts-left 
set -g @nova-nerdfonts-right 

set -g @nova-status-style-bg "#000000"
set -g @nova-status-style-fg "#ffffff"

set -g @nova-segment-mode "</>"
set -g @nova-segment-mode-colors "#000000 #ff1493"

set -g @nova-pane "#I:#W"
set -g @nova-status-style-active-fg "#000000"
set -g @nova-status-style-active-bg "#fff000"

set -g @nova-segment-whoami "#(whoami)"
set -g @nova-segment-whoami-colors "#7df9ff #000000"

set -g @nova-segment-dir "#{b:pane_current_path}"
set -g @nova-segment-dir-colors "#1a9bc0 #000000"

set -g @nova-segment-tech_stack "     "
set -g @nova-segment-tech_stack-colors "#000000 #ff1493"

set -g @nova-segments-0-left "mode"
set -g @nova-segments-0-right "dir whoami tech_stack"

set -g default-terminal "tmux-256color"
set -as terminal-overrides ",*:Tc"

run '~/.tmux/plugins/tpm/tpm'
